name: Monitor Website

on:
  schedule:
    # 建议改为每 15 分钟，并避开整点（例如在第 7, 22, 37, 52 分钟运行）
    # 这样能有效减少 GitHub Actions 的延迟排队
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: # 保留手动触发按钮

jobs:
  monitor:
    runs-on: ubuntu-latest
    # 必须开启写入权限，否则无法更新 last_hash.txt，会导致你一直收到重复邮件
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_hash.txt || true
          # 检查是否有文件变动，如果有则提交并推送
          if ! git diff --cached --exit-code; then
            git commit -m "自动更新：房源状态记录"
            git push
          else
            echo "网页内容未发生变动，无需更新记录。"
          fi
